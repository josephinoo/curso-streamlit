name: Render and Publish Quarto Slides Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto
        run: |
          for qmd in module-*/*.qmd; do
            if [ -f "$qmd" ]; then
              quarto render "$qmd"
            fi
          done

      - name: Prepare Site
        run: |
          mkdir -p _site
          
          # Root index header
          cat <<EOF > _site/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Curso Streamlit Slides</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; line-height: 1.6; }
              h1 { color: #333; }
              ul { list-style-type: none; padding: 0; }
              li { margin: 10px 0; }
              a { text-decoration: none; color: #0366d6; font-size: 1.2rem; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Curso Streamlit Slides</h1>
            <ul>
          EOF
          
          # Process each module dynamically
          for mod_dir in module-*; do
            if [ -d "$mod_dir" ]; then
              # Find the generated html (should match the qmd name)
              for html_file in "$mod_dir"/*.html; do
                if [ -f "$html_file" ]; then
                  base_name=$(basename "$html_file" .html)
                  files_dir="$mod_dir/${base_name}_files"
                  
                  mkdir -p "_site/$mod_dir"
                  mv "$html_file" "_site/$mod_dir/index.html"
                  
                  if [ -d "$files_dir" ]; then 
                    mv "$files_dir" "_site/$mod_dir/"
                  fi
                  
                  # Copy any assets
                  cp -r "$mod_dir"/*.png "$mod_dir"/*.mp4 "$mod_dir"/*.avif "$mod_dir"/assets "_site/$mod_dir/" 2>/dev/null || true
                  
                  # Add link to index.html (Capitalize module name for display)
                  mod_title=$(echo "$mod_dir" | tr '-' ' ' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
                  echo "              <li><a href=\"$mod_dir/\">▶ $mod_title</a></li>" >> _site/index.html
                  
                  # Only process the first html file found per module
                  break
                fi
              done
            fi
          done
          
          # Close HTML
          cat <<EOF >> _site/index.html
            </ul>
          </body>
          </html>
          EOF
          
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4